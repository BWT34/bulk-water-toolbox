<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">https://github.com/BWT34/bulk-water-toolbox/blob/main/POC.html
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Water Toolbox - POC</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;

    /* 🔥 BACKGROUND IMAGE + GRADIENT */
    background: 
        linear-gradient(rgba(0,50,50,0.7), rgba(0,30,30,0.9)),
        url('trucks.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: white;
}

/* HEADER */
.header {
    background: white;
    text-align: center;
    padding: 10px;
}

.header img {
    max-width: 90%;
    height: auto;
}

/* TITLE BAR */
.title {
    text-align: center;
    padding: 10px;
    font-size: 18px;
    background: rgba(0, 122, 135, 0.85); /* slight transparency */
    border-bottom: 4px solid #d91e18;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

/* CARD BUTTONS */
.card {
    background: rgba(0, 80, 80, 0.85); /* ✅ semi-transparent */
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    text-decoration: none;
    color: white;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    backdrop-filter: blur(4px); /* ✅ premium glass effect */
    transition: transform 0.15s ease, background 0.2s ease;
}

.card:hover {
    background: rgba(0, 120, 120, 0.9);
    transform: translateY(-2px); /* slight lift on hover */
}

.icon {
    font-size: 28px;
    margin-bottom: 8px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="header">
    <img src="BWT LOGO.jpg" alt="Bulk Water Transport Ltd">
</div>

<div class="title">
    🏠 Main Toolbox Menu - POC
</div>

<div class="grid">

<a class="card" href="secondary.html">
    <div class="icon">👷🚚</div>
    Drivers – Daily Forms
</a>

<a class="card" href="Thirdly.html">
    <div class="icon">🧑‍💼📊</div>
    Management – Operational Forms
</a>
    
</div>

</body>
</html>
