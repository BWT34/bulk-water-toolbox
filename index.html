<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Water Toolbox</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #0f3c44;
    color: white;
}

/* HEADER */
.header {
    background: white;
    text-align: center;
    padding: 10px;
}

.header img {
    max-width: 90%;
    height: auto;
}

/* TITLE BAR */
.title {
    text-align: center;
    padding: 10px;
    font-size: 18px;
    background: #007a87;
    border-bottom: 4px solid #d91e18;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

/* CARD BUTTONS */
.card {
    background: #1b5f69;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    text-decoration: none;
    color: white;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.card:hover {
    background: #237d89;
}

.icon {
    font-size: 28px;
    margin-bottom: 8px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="header">
    <!-- Replace src with where you upload your logo -->
    <img src="BWT LOGO.jpg" alt="Bulk Water Transport Ltd">
</div>

<div class="title">
    Toolbox Menu
</div>

<div class="grid">

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/BulkWaterRemoteDailySafetyBriefing">
    <div class="icon">📋</div>
    Daily Safety Briefing
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/VehiclePreStartCheck">
    <div class="icon">🚛</div>
    Vehicle Pre-Start
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/TowerServices">
    <div class="icon">🧾</div>
    Tower Services
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/PPERegister">
    <div class="icon">🦺</div>
    PPE Register
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/HolidayLeaveRequestForm">
    <div class="icon">📅</div>
    Leave Request
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/HireAgreementWaterTrucks">
    <div class="icon">🚧</div>
    Hire Agreement
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/DailyDeliverySheet">
    <div class="icon">📄</div>
    Daily Delivery Sheet
</a>
    
<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/HireTruckPreStartCheckList">
    <div class="icon">🚛</div>
    Hire Agreement - Pre-Start Check List
</a>
    
<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/HireTruckPostUseCheckList">
    <div class="icon">🛠</div>
    Hire Agreement - Returned Truck Check List
</a>

</div>

</body>
</html>
