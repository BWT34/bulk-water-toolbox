<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Water Toolbox</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial, sans-serif;
    background: #0f3c44;
    color: white;
}

/* HEADER */
.header {
    background: white;
    text-align: center;
    padding: 10px;
}

.header img {
        max-width: 90%;
    height: auto;
}

/* TITLE BAR */
.title {
    text-align: center;
    padding: 10px;
    font-size: 18px;
    background: #007a87;
    border-bottom: 4px solid #d91e18;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

/* CARD BUTTONS */
.card {
    background: #1b5f69;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    text-decoration: none;
    color: white;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.card:hover {
    background: #237d89;
}

.icon {
    font-size: 28px;
    margin-bottom: 8px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="header">
    <!-- Replace src with where you upload your logo -->
    <img src="BWT LOGO.jpg" alt="Bulk Water Transport Ltd">
</div>

<div class="title">
   🏠 Main Toolbox Menu 🏠
</div>

<div class="grid">

<a class="card" href="secondary.html">
    <div class="icon">👷🚚</div>
    Drivers - Daily Forms
</a>

<a class="card" href="Thirdly.html">
    <div class="icon">🧑‍💼📊</div>
    Management – Operational Forms
</a>
    
<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/PPEIssueRegister">
    <div class="icon">🥽🦺</div>
    PPE Supply Register
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/HolidayLeaveRequestForm">
    <div class="icon">🏖️📅</div>
    Leave Request
</a>

<a class="card" href="https://www.cognitoforms.com/BulkWaterTransportLtd/SiteIncidentAndInjuryRegister">
    <div class="icon">🚨🚑</div>
    Site Incident and Injury Register
</a>
    
</div> <!-- end grid -->

</body>
</html>
